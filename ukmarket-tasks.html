<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Tasks - TripFactory UK Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tf: { navy: '#1e3a5f', blue: '#2563eb', cyan: '#06b6d4', lime: '#84cc16', yellow: '#eab308', red: '#ef4444', dark: '#0f172a', card: '#1e293b' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { position: relative; padding: 0.5rem 0; }
        .nav-item::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: #06b6d4; transition: width 0.3s; }
        .nav-item:hover::after { width: 100%; }
        .nav-item.active::after { width: 100%; }
    </style>

</head>
<body class="min-h-screen bg-tf-dark">
    <!-- Navigation -->
    <nav class="glass fixed w-full z-50 top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Left: Brand -->
                <div class="flex items-center">
                    <a href="ukmarket.html" class="text-2xl font-bold text-white">
                        <span class="text-tf-cyan">Trip</span>Factory
                        <span class="text-sm font-normal text-gray-400 ml-2">UK Market</span>
                    </a>
                </div>

                <!-- Center: Navigation -->
                <div class="hidden md:flex space-x-6">
                    <a href="ukmarket.html" class="nav-item text-gray-300 hover:text-white transition">Dashboard</a>
<a href="ukmarket-contacts.html" class="nav-item active text-tf-cyan font-medium">Contacts</a>
<a href="ukmarket-hotels.html" class="nav-item text-gray-300 hover:text-white transition">Hotels</a>
<a href="ukmarket-7h-rates.html" class="nav-item text-gray-300 hover:text-white transition">7H Rates</a>
<a href="ukmarket-tours.html" class="nav-item text-gray-300 hover:text-white transition">Tours</a>
<a href="ukmarket-newtours-2026.html" class="nav-item text-gray-300 hover:text-white transition">Tour Collection 2026</a>
<a href="ukmarket-tasks.html" class="nav-item text-gray-300 hover:text-white transition">Tasks</a>
<a href="ukmarket-wiki.html" class="nav-item text-gray-300 hover:text-white transition">Wiki</a>
                </div>

                <!-- Right: User -->
                <div class="flex items-center space-x-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-medium text-white">Ajay Kawa</p>
                        <p class="text-xs text-gray-400">Head of Global Business Development</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>


<main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold mb-2">Task Management</h2>
                <p class="text-gray-400">Track operational tasks, contracting, and business development</p>
            </div>
            <button onclick="openAddModal()" class="px-6 py-3 bg-tf-cyan text-tf-dark font-semibold rounded-lg hover:bg-cyan-400 transition flex items-center">
                <i class="fas fa-plus mr-2"></i>New Task
            </button>
        </div>

        <!-- Task Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="glass rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-white" id="totalTasks">0</div>
                <div class="text-sm text-gray-400">Total Tasks</div>
            </div>
            <div class="glass rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-tf-yellow" id="todoTasks">0</div>
                <div class="text-sm text-gray-400">To Do</div>
            </div>
            <div class="glass rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-tf-blue" id="inProgressTasks">0</div>
                <div class="text-sm text-gray-400">In Progress</div>
            </div>
            <div class="glass rounded-lg p-4 text-center">
                <div class="text-2xl font-bold text-tf-lime" id="completedTasks">0</div>
                <div class="text-sm text-gray-400">Completed</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass rounded-xl p-4 mb-6">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search tasks..." 
                            class="w-full bg-tf-navy/50 border border-gray-600 rounded-lg pl-10 pr-4 py-2 text-white focus:border-tf-cyan focus:outline-none"
                            onkeyup="filterTasks()">
                    </div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <select id="statusFilter" onchange="filterTasks()" class="bg-tf-navy/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-tf-cyan focus:outline-none">
                        <option value="">All Status</option>
                        <option value="todo">To Do</option>
                        <option value="in-progress">In Progress</option>
                        <option value="review">In Review</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="priorityFilter" onchange="filterTasks()" class="bg-tf-navy/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-tf-cyan focus:outline-none">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <select id="assigneeFilter" onchange="filterTasks()" class="bg-tf-navy/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-tf-cyan focus:outline-none">
                        <option value="">All Assignees</option>
                        <option value="ajay">Ajay Kawa</option>
                        <option value="saif">Saif Khan</option>
                        <option value="ronak">Ronak S</option>
                    </select>
                    <select id="categoryFilter" onchange="filterTasks()" class="bg-tf-navy/50 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-tf-cyan focus:outline-none">
                        <option value="">All Categories</option>
                        <option value="contracting">Hotel Contracting</option>
                        <option value="operations">Operations</option>
                        <option value="business-dev">Business Development</option>
                        <option value="product">Product Development</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tasks List -->
        <div id="tasksList" class="space-y-3">
            <!-- Tasks populated by JavaScript -->
        </div>
    </main>

<script src="https://cdn.tailwindcss.com"></script>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tf: { navy: '#1e3a5f', blue: '#2563eb', cyan: '#06b6d4', lime: '#84cc16', yellow: '#eab308', red: '#ef4444', dark: '#0f172a', card: '#1e293b' }
                    }
                }
            }
        }
    </script>
<script>
        const assigneeNames = {
            ajay: 'Ajay Kawa',
            saif: 'Saif Khan',
            ronak: 'Ronak S'
        };

        const assigneeColors = {
            ajay: 'bg-tf-cyan/20 text-tf-cyan',
            saif: 'bg-tf-lime/20 text-tf-lime',
            ronak: 'bg-tf-blue/20 text-tf-blue'
        };

        const categoryLabels = {
            contracting: 'Hotel Contracting',
            operations: 'Operations',
            'business-dev': 'Business Development',
            product: 'Product Development',
            marketing: 'Marketing',
            admin: 'Administration'
        };

        const statusLabels = {
            todo: 'To Do',
            'in-progress': 'In Progress',
            review: 'In Review',
            completed: 'Completed'
        };

        let tasks = [];
        let editingId = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadTasks();
            renderTasks();
            updateStats();
        });

        function loadTasks() {
            const stored = localStorage.getItem('ukmarket_tasks');
            if (stored) {
                tasks = JSON.parse(stored);
            }
        }

        function renderTasks(filtered = tasks) {
            const list = document.getElementById('tasksList');
            
            const sorted = filtered.sort((a, b) => {
                const priorityOrder = { high: 0, medium: 1, low: 2 };
                if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
                    return priorityOrder[a.priority] - priorityOrder[b.priority];
                }
                return new Date(a.dueDate || '9999') - new Date(b.dueDate || '9999');
            });

            if (sorted.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-check-circle text-4xl text-gray-600 mb-4"></i>
                        <p class="text-gray-400">No tasks found</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = sorted.map(task => `
                <div class="task-card glass rounded-lg p-4 priority-${task.priority} ${task.status === 'completed' ? 'opacity-60' : ''}">
                    <div class="flex items-start justify-between">
                        <div class="flex items-start space-x-4 flex-1">
                            <button onclick="toggleComplete(${task.id})" class="mt-1 w-6 h-6 rounded border-2 ${task.status === 'completed' ? 'bg-tf-lime border-tf-lime' : 'border-gray-500 hover:border-tf-cyan'} flex items-center justify-center transition">
                                ${task.status === 'completed' ? '<i class="fas fa-check text-tf-dark text-xs"></i>' : ''}
                            </button>
                            
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <h4 class="font-semibold ${task.status === 'completed' ? 'line-through text-gray-500' : 'text-white'}">${task.title}</h4>
                                    <span class="px-2 py-0.5 rounded text-xs ${assigneeColors[task.assignee]}">${assigneeNames[task.assignee]}</span>
                                    <span class="px-2 py-0.5 rounded text-xs bg-gray-700">${categoryLabels[task.category]}</span>
                                </div>
                                
                                ${task.description ? `<p class="text-sm text-gray-400 mb-2 ${task.status === 'completed' ? 'line-through' : ''}">${task.description}</p>` : ''}
                                
                                <div class="flex items-center gap-4 text-xs text-gray-500">
                                    ${task.dueDate ? `
                                        <span class="${isOverdue(task.dueDate) && task.status !== 'completed' ? 'text-tf-red' : ''}">
                                            <i class="fas fa-calendar mr-1"></i>${formatDate(task.dueDate)}
                                            ${isOverdue(task.dueDate) && task.status !== 'completed' ? ' (Overdue)' : ''}
                                        </span>
                                    ` : ''}
                                    <span class="capitalize"><i class="fas fa-flag mr-1"></i>${task.priority} Priority</span>
                                    <span class="capitalize"><i class="fas fa-circle text-xs mr-1"></i>${statusLabels[task.status]}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex space-x-2 ml-4">
                            <button onclick="editTask(${task.id})" class="p-2 rounded-lg hover:bg-gray-700 transition text-gray-400 hover:text-white">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteTask(${task.id})" class="p-2 rounded-lg hover:bg-red-900/30 transition text-gray-400 hover:text-red-400">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterTasks() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const assignee = document.getElementById('assigneeFilter').value;
            const category = document.getElementById('categoryFilter').value;

            const filtered = tasks.filter(task => {
                const matchesSearch = !search || 
                    task.title.toLowerCase().includes(search) ||
                    (task.description && task.description.toLowerCase().includes(search));
                const matchesStatus = !status || task.status === status;
                const matchesPriority = !priority || task.priority === priority;
                const matchesAssignee = !assignee || task.assignee === assignee;
                const matchesCategory = !category || task.category === category;

                return matchesSearch && matchesStatus && matchesPriority && matchesAssignee && matchesCategory;
            });

            renderTasks(filtered);
        }

        function updateStats() {
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('todoTasks').textContent = tasks.filter(t => t.status === 'todo').length;
            document.getElementById('inProgressTasks').textContent = tasks.filter(t => t.status === 'in-progress').length;
            document.getElementById('completedTasks').textContent = tasks.filter(t => t.status === 'completed').length;
        }

        function isOverdue(date) {
            return new Date(date) < new Date().setHours(0,0,0,0);
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = task.status === 'completed' ? 'todo' : 'completed';
                localStorage.setItem('ukmarket_tasks', JSON.stringify(tasks));
                renderTasks();
                updateStats();
            }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'New Task';
            document.getElementById('taskForm').reset();
            document.getElementById('taskStatus').value = 'todo';
            document.getElementById('taskModal').classList.remove('hidden');
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Task';
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDescription').value = task.description || '';
            document.getElementById('taskCategory').value = task.category;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskAssignee').value = task.assignee;
            document.getElementById('taskDueDate').value = task.dueDate || '';
            document.getElementById('taskStatus').value = task.status;
            
            document.getElementById('taskModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.add('hidden');
            editingId = null;
        }

        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const taskData = {
                id: editingId || Date.now(),
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                category: document.getElementById('taskCategory').value,
                priority: document.getElementById('taskPriority').value,
                assignee: document.getElementById('taskAssignee').value,
                dueDate: document.getElementById('taskDueDate').value,
                status: document.getElementById('taskStatus').value,
                updatedAt: new Date().toISOString()
            };

            if (editingId) {
                const index = tasks.findIndex(t => t.id === editingId);
                tasks[index] = { ...tasks[index], ...taskData };
            } else {
                taskData.createdAt = new Date().toISOString();
                tasks.push(taskData);
            }

            localStorage.setItem('ukmarket_tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
            closeModal();
        });

        function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('ukmarket_tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        window.onclick = function(event) {
            if (event.target.id === 'taskModal') closeModal();
        }
    </script>
</body>
</html>
